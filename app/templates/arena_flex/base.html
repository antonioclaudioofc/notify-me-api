<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
          margin: 0;
          padding: 0;
          background-color: #f0f2f5;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          -webkit-font-smoothing: antialiased;
      }
      .wrapper {
          width: 100%;
          table-layout: fixed;
          background-color: #f0f2f5;
          padding-bottom: 40px;
          padding-top: 40px;
      }
      .main {
          background-color: #ffffff;
          margin: 0 auto;
          width: 100%;
          max-width: 600px;
          border-spacing: 0;
          color: #1a1a1a;
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      h1 { font-size: 28px; font-weight: 700; margin: 0; line-height: 1.2; }
      h2 { font-size: 20px; font-weight: 600; margin: 0; }
      p { font-size: 16px; line-height: 1.6; color: #4b5563; margin: 0; }

      .header {
          padding: 48px 32px;
          text-align: center;
          color: #ffffff;
      }
      .content {
          padding: 40px 32px;
      }
      .footer {
          padding: 32px;
          text-align: center;
          background-color: #f9fafb;
          border-top: 1px solid #f3f4f6;
      }

      .btn {
          display: inline-block;
          padding: 14px 28px;
          border-radius: 8px;
          text-decoration: none;
          font-weight: 600;
          font-size: 16px;
          transition: transform 0.2s ease;
      }
      .card {
          background-color: #f8fafc;
          border: 1px solid #e2e8f0;
          border-radius: 12px;
          padding: 24px;
          margin-top: 24px;
          margin-bottom: 24px;
      }
      .label {
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          color: #94a3b8;
          font-weight: 700;
          margin-bottom: 4px;
          display: block;
      }
      .value {
          font-size: 16px;
          color: #1e293b;
          font-weight: 600;
      }

      .text-primary { color: #4f46e5; }

      {% block extra_styles %} {% endblock %}
    </style>
  </head>
  <body>
    <center class="wrapper">
      <table
        class="main"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        role="presentation"
      >
        <tr>
          <td
            class="header"
            style="background: {% block header_bg %}linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%){% endblock %};"
          >
            {% block header_content %}{% endblock %}
          </td>
        </tr>
        <tr>
          <td class="content">{% block content %}{% endblock %}</td>
        </tr>
        <tr>
          <td class="footer">
            <p style="font-size: 14px; color: #94a3b8; margin-bottom: 8px">
              © 2026 Arena Flex • Inteligência em Gestão Esportiva
            </p>
            <p style="font-size: 12px; color: #cbd5e1">
              Este é um e-mail automático, por favor não responda.
            </p>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
